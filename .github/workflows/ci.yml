name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  php-lint:
    name: PHP lint (PHPCS + PHPStan)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.2', '8.3', '8.4']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor/
          key: php-lint-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            php-lint-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHPCS
        run: composer phpcs

      - name: PHPStan
        run: php -d memory_limit=1G vendor/bin/phpstan analyse --configuration=./phpstan.neon --error-format=github

  js-lint:
    name: JS lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Build
        run: npm run build

  test:
    name: PHPUnit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.2', '8.3', '8.4']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor/
          key: phpunit-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            phpunit-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHPUnit (unit tests)
        run: vendor/bin/phpunit --testsuite unit --display-deprecations

  e2e:
    name: Playwright
    runs-on: ubuntu-latest
    needs: [js-lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Build SPA
        run: npm run build

      - name: Run E2E tests (dashboard load)
        run: npx playwright test --project=chromium
        env:
          WP_BASE_URL: ${{ vars.WP_BASE_URL || 'http://localhost:8889/wp-admin' }}
